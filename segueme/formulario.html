<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segue-Me | Ficha de Cadastro Completa</title>
    <link rel="stylesheet" href="styleformulario.css">
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo-placeholder">
                <img src="logo1.png" alt="Segue-Me Logo">
            </div>
        </div>

        <h2 class="text-center">Ficha de Membro</h2>
        <p class="subtitle text-center">Preencha todos os requisitos para atualizar seu cadastro no movimento.</p>

        <form id="main-form">
            <!-- TIPO DE PERFIL -->
            <div class="input-group">
                <label>Eu sou:</label>
                <select id="perfil-tipo" onchange="togglePerfil()">
                    <option value="jovem">Jovem</option>
                    <option value="tio">Casado (Tio/Tia)</option>
                </select>
            </div>

            <!-- DADOS BÁSICOS (JOVEM OU TITULAR) -->
            <div class="section-title">Dados Pessoais</div>
            
            <div id="dados-jovem">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo">
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Data de Nascimento</label>
                        <input type="date">
                    </div>
                    <div class="input-group">
                        <label>Idade</label>
                        <input type="number" placeholder="Ex: 22">
                    </div>
                </div>
                <div class="input-group">
                    <label>Telefone / WhatsApp</label>
                    <input type="tel" placeholder="(00) 00000-0000">
                </div>
                <div class="input-group">
                    <label>Endereço Residencial</label>
                    <input type="text" placeholder="Rua, Número, Bairro, Cidade">
                </div>
            </div>

            <!-- CAMPOS EXCLUSIVOS PARA CASADOS (TIOS) -->
            <div id="campos-tios" class="hidden">
                <div class="section-title">Dados do Cônjuge</div>
                <div class="input-group">
                    <label>Nome do Cônjuge</label>
                    <input type="text" placeholder="Nome completo do marido/esposa">
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Idade do Cônjuge</label>
                        <input type="number" placeholder="Idade">
                    </div>
                    <div class="input-group">
                        <label>Telefone do Cônjuge</label>
                        <input type="tel" placeholder="(00) 00000-0000">
                    </div>
                </div>
                <div class="input-group">
                    <label>Tem filhos? Quantos?</label>
                    <input type="text" placeholder="Ex: Sim, 2 filhos">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="fez-ecc">
                    <label for="fez-ecc">Já fizeram o ECC?</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="jovens-segue-me">
                    <label for="jovens-segue-me">São jovens que fizeram o Segue-me e casaram?</label>
                </div>
            </div>

            <!-- HISTÓRICO NO SEGUE-ME -->
            <div class="section-title">Minha Jornada no Segue-Me</div>
            
            <div class="input-row">
                <div class="input-group">
                    <label>Ano que FEZ o Segue-me</label>
                    <input type="number" placeholder="Ex: 2013">
                </div>
                <div class="input-group">
                    <label>Qual o Segue-me? (Paróquia/Cidade)</label>
                    <input type="text" placeholder="Ex: Santo Antônio / BG">
                </div>
            </div>

            <div class="input-group">
                <label>Última equipe que serviu:</label>
                <input type="text" placeholder="Ex: Cozinha (2023)">
            </div>

            <!-- ABA DE EQUIPES TRABALHADAS -->
            <div class="section-title">Histórico de Equipes Trabalhadas</div>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 10px;">
                Adicione cada equipe, o ano e se foi coordenador:
            </p>
            <div id="lista-equipes">
                <div class="history-item">
                    <div class="input-row">
                        <div class="input-group" style="flex: 2;">
                            <label>Equipe</label>
                            <input type="text" placeholder="Ex: Montagem">
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Ano</label>
                            <input type="number" placeholder="2015">
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox"> <label>Fui Coordenador(a) nesta equipe</label>
                    </div>
                </div>
            </div>
            <button type="button" class="btn-add" onclick="addEquipe()">+ Adicionar outra equipe/ano</button>

            <!-- LIDERANÇA E CONSELHO -->
            <div class="section-title">Liderança e Conselho</div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="serviu-lideranca">
                <label for="serviu-lideranca">Já serviu em cargo de liderança na igreja?</label>
            </div>
            <div class="input-group">
                <label>Se sim, qual cargo e onde?</label>
                <input type="text" placeholder="Ex: Coordenador de Setor, Vice-presidência...">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="vontade-lideranca">
                <label for="vontade-lideranca">Tem vontade/interesse em servir em cargos de liderança?</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="fez-ed">
                <label for="fez-ed">Já fez parte da ED (Encontro de Dirigentes) ou Conselho?</label>
            </div>
            <div class="input-group">
                <label>Se sim, em qual Pasta?</label>
                <input type="text" placeholder="Ex: Pasta da Cozinha, Espiritualidade, Pós-Encontro...">
            </div>

            <!-- TALENTOS E SAÚDE -->
            <div class="section-title">Talentos e Saúde</div>
            
            <div class="input-row">
                <div class="input-group">
                    <label>Toca algum instrumento?</label>
                    <input type="text" placeholder="Qual?">
                </div>
                <div class="input-group">
                    <label>Você canta?</label>
                    <input type="text" placeholder="Sim/Não">
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="dar-palestra">
                <label for="dar-palestra">Gostaria de ser chamado para dar palestra no Segue-me?</label>
            </div>

            <div class="input-group">
                <label>Tem alguma alergia ou restrição?</label>
                <textarea rows="3" placeholder="Alergias alimentares, medicamentosas, etc."></textarea>
            </div>

            <button type="submit" class="btn-entrar">Salvar Ficha de Cadastro</button>
        </form>

        <div class="footer-links" style="text-align: center; margin-top: 20px;">
            <a href="index.html">Voltar ao Login</a>
        </div>
    </div>

    <script>
        function togglePerfil() {
            const perfil = document.getElementById('perfil-tipo').value;
            const camposTios = document.getElementById('campos-tios');
            if (perfil === 'tio') {
                camposTios.classList.remove('hidden');
            } else {
                camposTios.classList.add('hidden');
            }
        }

        function addEquipe() {
            const container = document.getElementById('lista-equipes');
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div class="input-row">
                    <div class="input-group" style="flex: 2;">
                        <label>Equipe</label>
                        <input type="text" placeholder="Ex: Montagem">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Ano</label>
                        <input type="number" placeholder="2015">
                    </div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox"> <label>Fui Coordenador(a) nesta equipe</label>
                </div>
            `;
            container.appendChild(div);
        }
    </script>
</body>
</html>
