<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segue-Me | Cadastro</title>
    <link rel="stylesheet" href="stylecadastro.css">
</head>
<body>

    <div class="cadastro-container">
        <div class="cadastro-card">
            <div class="logo-box">
                <img src="logo1.png" alt="Segue-Me Logo">
            </div>

            <h2>Criar Nova Conta</h2>
            <p class="subtitle">Preencha os campos abaixo para participar.</p>

            <form id="form-cadastro">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="nascimento">Data de Nascimento</label>
                        <input type="date" id="nascimento" required>
                    </div>
                    <div class="input-group">
                        <label for="whatsapp">WhatsApp</label>
                        <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="input-group">
                        <label for="confirmar-senha">Confirmar Senha</label>
                        <input type="password" id="confirmar-senha" placeholder="Repita a senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-entrar" id="btn-cadastrar">Cadastrar e Participar</button>
            </form>

            <div style="margin-top: 20px;">
                <a href="index.html" style="color: #d4af37; text-decoration: none; font-weight: bold;">Já tenho conta. Voltar para o Login</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBigAjWkFd6mqKGoxJyQX4hBLTbCOMx4Is",
            authDomain: "segue-me-55296.firebaseapp.com",
            projectId: "segue-me-55296",
            storageBucket: "segue-me-55296.firebasestorage.app",
            messagingSenderId: "326941771035",
            appId: "1:326941771035:web:d1a60c2694536816deffbe",
            measurementId: "G-4KHGR7Q6KP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('form-cadastro').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;
            const btn = document.getElementById('btn-cadastrar');

            if (senha !== confirmarSenha) {
                alert("As senhas não coincidem!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Criando conta...";

            try {
                // Validação contra e-mails duplicados
                const q = query(collection(db, "usuarios"), where("email", "==", email));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    alert("Este e-mail já está cadastrado no sistema!");
                    btn.disabled = false;
                    btn.innerText = "Cadastrar e Participar";
                    return;
                }

                const dadosUsuario = {
                    nome: document.getElementById('nome').value,
                    data_nascimento: document.getElementById('nascimento').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    email: email,
                    senha: senha,
                    data_cadastro: new Date()
                };

                await addDoc(collection(db, "usuarios"), dadosUsuario);
                alert("Cadastro realizado com sucesso! Faça seu login.");
                window.location.href = "index.html";

            } catch (error) {
                console.error("Erro ao cadastrar: ", error);
                alert("Erro ao salvar cadastro no banco.");
                btn.disabled = false;
                btn.innerText = "Cadastrar e Participar";
            }
        });
    </script>
</body>
</html>
